<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login - House of Speed</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1f2e 0%, #2c3e50 100%);
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(180, 145, 111, 0.3);
            border-radius: 15px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #b4916f;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .login-header p {
            color: rgba(245, 243, 240, 0.7);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #b4916f;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(180, 145, 111, 0.3);
            border-radius: 8px;
            color: #f5f3f0;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #b4916f;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #b4916f 0%, #c9a05b 100%);
            color: #1a1f2e;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(180, 145, 111, 0.4);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: rgba(245, 243, 240, 0.5);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(180, 145, 111, 0.3);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(245, 243, 240, 0.7);
        }

        .signup-link a {
            color: #b4916f;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .alert.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .alert.show {
            display: block;
        }

        .demo-credentials {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .demo-credentials h3 {
            color: #3498db;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .demo-credentials p {
            color: rgba(245, 243, 240, 0.8);
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(245, 243, 240, 0.7);
            text-decoration: none;
            font-size: 0.9em;
        }

        .back-link a:hover {
            color: #b4916f;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🏎️ Client Portal</h1>
                <p>Welcome to House of Speed</p>
            </div>

            <div class="demo-credentials">
                <h3>📝 Demo Credentials</h3>
                <p>Email: <strong>customer@www.houseofspeed.nl</strong></p>
                <p>Password: <strong>Customer123!</strong></p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your@email.com"
                        value="customer@www.houseofspeed.nl"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        value="Customer123!"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="divider">or</div>

            <div class="signup-link">
                <p>Don't have an account? <a href="client-signup.html">Create Account</a></p>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Homepage</a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Show loading state
            const btn = event.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                // For demo purposes, simulate authentication
                // In production, this would call your backend API

                if (email === 'customer@www.houseofspeed.nl' && password === 'Customer123!') {
                    // Store session
                    localStorage.setItem('clientSession', JSON.stringify({
                        email: email,
                        name: 'Demo Customer',
                        loggedIn: true,
                        timestamp: Date.now()
                    }));

                    showAlert('✅ Login successful! Redirecting...', 'success');

                    // Redirect to account page
                    setTimeout(() => {
                        window.location.href = 'account.html';
                    }, 1500);
                } else {
                    showAlert('❌ Invalid email or password', 'error');
                    btn.textContent = originalText;
                    btn.disabled = false;
                }

                // In production, uncomment this to use real API:
                /*
                const response = await fetch('/api/client/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'account.html';
                    }, 1500);
                } else {
                    showAlert(`❌ ${data.error || 'Login failed'}`, 'error');
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
                */

            } catch (error) {
                showAlert(`❌ Error: ${error.message}`, 'error');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const session = localStorage.getItem('clientSession');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.loggedIn) {
                        showAlert('✅ Already logged in! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = 'account.html';
                        }, 1500);
                    }
                } catch (e) {
                    // Invalid session, clear it
                    localStorage.removeItem('clientSession');
                }
            }
        });
    </script>
</body>
</html>
