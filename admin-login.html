<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | House of Speed</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* HOS Theme */
        :root {
            --hos-black: #111111;
            --hos-black-primary: #1a1a1a;
            --hos-black-elevated: #1e1e1e;
            --hos-black-card: #222222;
            --hos-black-surface: #2a2a2a;
            --hos-black-border: #333333;
            --hos-black-muted: #444444;
            --hos-gold: #c9a05b;
            --hos-gold-light: #d4b06a;
            --hos-gold-dark: #b08a45;
            --hos-gold-10: rgba(201, 160, 91, 0.1);
            --hos-gold-20: rgba(201, 160, 91, 0.2);
            --hos-gold-30: rgba(201, 160, 91, 0.3);
            --hos-text-primary: #ffffff;
            --hos-text-secondary: #cccccc;
            --hos-text-muted: #999999;
            --hos-text-on-gold: #1a1a1a;
            --hos-error: #d32f2f;
            --hos-success: #388e3c;
            --hos-warning: #f9a825;
            --hos-nav-bg: rgba(20, 20, 20, 0.95);
            --hos-status-red-light: #ff6b7a;
        }

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: var(--hos-black-primary);
            color: var(--hos-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--hos-black);
            border: 1px solid var(--hos-black-surface);
            border-radius: 4px;
            padding: 48px 40px;
            text-align: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--hos-gold);
            margin-bottom: 4px;
        }

        .logo-subtitle {
            font-size: 11px;
            letter-spacing: 8px;
            color: var(--hos-gold);
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--hos-text-hint);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: transparent;
            border: 1px solid var(--hos-gold);
            border-radius: 2px;
            color: var(--hos-text-primary);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            border-color: var(--hos-gold);
            box-shadow: 0 0 0 1px var(--hos-gold-30);
        }

        .form-group input::placeholder {
            color: var(--hos-gray-500);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background-color: transparent;
            border: 1px solid var(--hos-gold);
            color: var(--hos-gold);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: background-color 0.3s, color 0.3s;
        }

        .login-btn:hover {
            background-color: var(--hos-gold);
            color: var(--hos-black);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            margin-top: 16px;
            padding: 10px 14px;
            background-color: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            border-radius: 2px;
            color: var(--hos-status-red-light);
            font-size: 13px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--hos-gold);
            margin: 0 auto 32px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-text">HOUSE OF SPEED</div>
            <div class="logo-subtitle">COLLECTIONS</div>
            <div class="divider"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
                <div class="error-message" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // If already authenticated, redirect to admin
            fetch('/api/auth/check', { credentials: 'include' })
                .then(function(res) { if (res.ok) return res.json(); })
                .then(function(data) { if (data && data.authenticated) window.location.href = 'admin.html'; })
                .catch(function() {});

            var form = document.getElementById('loginForm');
            var errorMsg = document.getElementById('errorMsg');
            var loginBtn = document.getElementById('loginBtn');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                errorMsg.classList.remove('visible');
                loginBtn.disabled = true;
                loginBtn.textContent = 'Signing in...';

                var username = document.getElementById('username').value.trim();
                var password = document.getElementById('password').value;

                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: username, password: password })
                })
                .then(function(res) {
                    if (!res.ok) return res.json().then(function(d) { throw new Error(d.message || 'Invalid credentials'); });
                    return res.json();
                })
                .then(function() {
                    window.location.href = 'admin.html';
                })
                .catch(function(err) {
                    errorMsg.textContent = err.message || 'Login failed. Please try again.';
                    errorMsg.classList.add('visible');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                });
            });
        })();
    </script>
</body>
</html>
